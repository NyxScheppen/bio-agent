skills:
  - skill_id: sequence_alignment
    name: "序列比对分析"
    category: modeling
    description: "多序列比对（MSA）、保守性分析、系统发育树构建"
    task_types: [bioinformatics]
    subtask_types: [sequence_analysis]
    trigger_keywords: [alignment, MSA, BLAST, phylogeny, conservation]
    trigger_keywords_cn: [序列比对, 多序列比对, 保守性, 进化树, 系统发育]

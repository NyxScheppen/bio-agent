    task_types: [modeling]
    subtask_types: [structure_prediction]
    trigger_keywords: [AlphaFold, protein structure, 3D structure, fold prediction]
    trigger_keywords_cn: [蛋白结构, AlphaFold, 三维结构, 结构预测, 折叠]

skills:
  - skill_id: spatial_clustering
    name: "空间转录组聚类"
    category: spatial
    description: "对空间转录组数据进行空间感知聚类分析"
    task_types: [bioinformatics]
    subtask_types: [spatial_analysis, spatial_clustering]
    trigger_keywords: [spatial transcriptomics, Visium, spatial clustering]
    trigger_keywords_cn: [空间转录组, 空间聚类, Visium, 空间分析]
    required_inputs: [expression_file, spatial_coords_file]
    optional_inputs: [tissue_image]
    allowed_tools: []
    tool_categories: [spatial]
    max_tool_rounds: 14
    safety_rules: ["空间聚类依赖坐标精度"]
    report_sections:
      - section_id: spatial_map
        title: "空间分布图"
        content_hint: "空间聚类、基因表达空间分布"
        order: 1
      - section_id: cluster_markers
        title: "空间区域 marker"
        content_hint: "各空间区域的 marker 基因"
        order: 2
    output_expectations: [spatial_cluster_plot.png, spatial_markers.csv, spatial_feature_plot.png]
    implementation_status: planned
    priority: high
    version: "1.0"

  - skill_id: spatial_region_de
    name: "空间区域差异分析"
    category: spatial
    description: "对不同空间区域进行差异表达分析"
    task_types: [bioinformatics]
    subtask_types: [spatial_analysis]
    trigger_keywords_cn: [空间差异, 区域差异, 空间 DEG]
    required_inputs: [expression_file, spatial_coords_file, region_labels]
    allowed_tools: []
    tool_categories: [spatial]
    max_tool_rounds: 10
    implementation_status: planned
    priority: medium
    version: "1.0"

  - skill_id: spatial_cell_deconvolution
    name: "空间转录组反卷积"
    category: spatial
    description: "使用 RCTD/SPOTlight 对空间转录组 spot 进行细胞类型反卷积"
    task_types: [bioinformatics]
    subtask_types: [spatial_deconvolution]
    trigger_keywords_cn: [反卷积, 细胞比例, RCTD, SPOTlight]
    required_inputs: [spatial_data_file, scrna_reference]
    allowed_tools: []
    tool_categories: [spatial, scrna]
    max_tool_rounds: 14
    implementation_status: planned
    priority: low
    version: "1.0"
